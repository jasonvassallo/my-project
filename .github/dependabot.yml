# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for more information:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:
 - package-ecosystem: "devcontainers"
   directory: "/"
   schedule:
     interval: weekly
   # NOTE: no `cooldown:` block here — the devcontainers ecosystem does NOT
   # support cooldown (GitHub docs, dependabot-options-reference support
   # table, verified 2026-07-22). The Semgrep dependabot-missing-cooldown
   # finding is therefore unsatisfiable for this repo: accept-ignore it in
   # the dashboard.
